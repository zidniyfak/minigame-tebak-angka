<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tebak Angka - Minimalist</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <!-- SweetAlert2 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css"
      rel="stylesheet"
    />
    <!-- Animate.css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container d-flex justify-content-center">
      <div class="card game-card animate__animated animate__zoomIn animate__faster">
        <div class="header-section">
          <h1 class="fw-bold m-0 h3">TEBAK ANGKA</h1>
          <p class="opacity-75 m-0 small">Kalahkan Komputer!</p>
        </div>

        <div class="card-body py-5 px-3 text-center">
          <p class="text-secondary mb-4">Pilih satu angka untuk memulai:</p>

          <div class="d-flex justify-content-center flex-nowrap">
            <button onclick="play('1')" class="btn btn-number text-primary">1</button>
            <button onclick="play('2')" class="btn btn-number text-primary">2</button>
            <button onclick="play('3')" class="btn btn-number text-primary">3</button>
            <button onclick="play('4')" class="btn btn-number text-primary">4</button>
            <button onclick="play('5')" class="btn btn-number text-primary">5</button>
          </div>
        </div>
      </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
